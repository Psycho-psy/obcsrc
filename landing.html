<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Support Fund</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js"></script>
</head>
<body>
  <header>
    <img src="logo.jpeg" alt="Student Fund Logo" class="logo">
    <h1>Welcome to Student Support Fund</h1>
  </header>

  <main class="landing">
    <section id="landingContent">
      <h2>Financial Support for Students</h2>
      <p>Apply for funds to support your academic journey.</p>
      <a href="apply.html" id="applyBtn" class="btn">Apply Now</a>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getDatabase, ref, get, child } 
      from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";

    // Firebase config (same as admin panel)
    const firebaseConfig = {
      apiKey: "AIzaSyC8ZiEuC0EWgLwn47qMUgyE-bdrOTzBm3c",
      authDomain: "knustobc-src.firebaseapp.com",
      databaseURL: "https://knustobc-src-default-rtdb.firebaseio.com",
      projectId: "knustobc-src",
      storageBucket: "knustobc-src.firebasestorage.app",
      messagingSenderId: "719112734540",
      appId: "1:719112734540:web:5580eb9c92aa31089b31e9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");

    async function validateToken() {
      const applyBtn = document.getElementById("applyBtn");

      if (!token) {
        alert("No access token found. Please use the link generated by admin.");
        applyBtn.style.display = "none";
        return;
      }

      const snapshot = await get(child(ref(db), "tokens/" + token));
      if (!snapshot.exists()) {
        alert("Invalid token. Access denied.");
        applyBtn.style.display = "none";
        return;
      }

      const tokenData = snapshot.val();
      const now = new Date();
      const expiresAt = new Date(tokenData.expiresAt);

      if (now > expiresAt) {
        alert("This token has expired. Please request a new link from admin.");
        applyBtn.style.display = "none";
      } else {
        // Token is valid → show Apply button and token info
        const tokenDisplay = document.createElement("p");
        tokenDisplay.textContent = "Access Token: " + token + " (valid until " + expiresAt.toDateString() + ")";
        tokenDisplay.style.fontWeight = "bold";
        tokenDisplay.style.color = "green";
        document.getElementById("landingContent").prepend(tokenDisplay);

        // Store token for later use in apply.html
        localStorage.setItem("applicationToken", token);
        applyBtn.style.display = "inline-block";
      }
    }

    validateToken();
  </script>
</body>
</html>
